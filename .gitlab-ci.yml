---
stages:
  - lint
  - build
  - test
  - release
  - cleanup

variables:
  http_proxy: ''
  https_proxy: ''
  no_proxy: ''
  BUILDX_VERSION: "v0.24.0"  # 🛠 Version von Renovate aktualisieren lassen
  DOCKER_API_VERSION: "1.44"

mega-linter:
  stage: lint
  # You can override MegaLinter flavor used to have faster performances
  # More info at https://megalinter.github.io/flavors/
  image:
    pull_policy: if-not-present
    name: oxsecurity/megalinter:v9
  before_script: []
  script: ['true'] # if script: ["true"] does not work, you may try ->  script: [ "/bin/bash /entrypoint.sh" ]
  variables:
    # All available variables are described in documentation
    # https://megalinter.github.io/configuration/
    DEFAULT_WORKSPACE: $CI_PROJECT_DIR
    # ADD YOUR CUSTOM ENV VARIABLES HERE TO OVERRIDE VALUES OF .mega-linter.yml AT THE ROOT OF YOUR REPOSITORY
  artifacts:
    when: always
    paths:
      - megalinter-reports
    expire_in: 1 week
  allow_failure: false
  tags:
    - dind
  rules:
    # Trigger bei jedem Push in einen Branch
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH

.create_multi_arch_image:
  image: docker:29.3.1
  services:
    - name: docker:29.3.1-dind
      command: ['--experimental']
      alias: 'docker'
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_BUILDKIT: 1
    DOCKER_API_VERSION: "1.41"
    BUILDPLATFORM: linux/amd64,linux/arm64
  before_script:
    - docker version
    - echo -n $DOCKER_REGISTRY_PASSWORD | docker login -u $DOCKER_REGISTRY_USER --password-stdin
    # Install curl and the Docker Scout CLI and Buildx
    - |
      apk add --update curl
      curl -sSfL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh -s --
      rm -rf /var/cache/apk/*
      mkdir -vp ~/.docker/cli-plugins/
      curl --silent -L "https://github.com/docker/buildx/releases/download/${BUILDX_VERSION}/buildx-${BUILDX_VERSION}.linux-amd64" > ~/.docker/cli-plugins/docker-buildx
      curl -sSfL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh -s --
      chmod a+x ~/.docker/cli-plugins/docker-buildx
    # Login to Docker Hub required for Docker Scout CLI
    - echo "$DOCKER_REGISTRY_PASSWORD" | docker login -u "$DOCKER_REGISTRY_USER" --password-stdin
    # Starting QEMU User Static Container and Build the MultiArch Container
    # || true: binfmt "File exists" errors are benign when multiple jobs share a runner
    - docker run --rm --privileged multiarch/qemu-user-static --reset -p yes || true
    - docker buildx create --driver=docker-container --use --name job-$CI_JOB_ID
    - docker buildx inspect --bootstrap
  after_script:
    - docker logout
    - docker rm buildx_buildkit_job-${CI_JOB_ID}0 --force || true
  tags:
    - cq-sans-dind

docker_build:
  extends: .create_multi_arch_image
  stage: build
  script:
    - build_tags=""
    - |
      if [ -n "$CI_COMMIT_TAG" ]
      then
        MAJOR_VERSION=$(echo "$CI_COMMIT_TAG" | awk -F'.' '{print $1}')
        MAJOR_MINOR_VERSION=$(echo "$CI_COMMIT_TAG" | awk -F'.' '{print $1"."$2}')
        echo "Version: ${VERSION}, Major Version: ${MAJOR_VERSION}, Major Minor Version: ${MAJOR_MINOR_VERSION}"
        echo "Running on tag '$CI_COMMIT_TAG': ${DOCKERHUB_IMAGE}:${CI_COMMIT_TAG}"
        # Build Multi Arch Images and push to dockerhub
        docker buildx build --provenance=true --sbom=true --build-arg BUILD_VERSION=$CI_COMMIT_REF_NAME --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') --build-arg VCS_REF=$CI_COMMIT_SHORT_SHA --build-arg CI_BUILD=$CI_PIPELINE_ID --push --platform $BUILDPLATFORM --tag $DOCKERHUB_IMAGE:$CI_COMMIT_TAG --tag $DOCKERHUB_IMAGE:$MAJOR_VERSION --tag $DOCKERHUB_IMAGE:$MAJOR_MINOR_VERSION --tag $DOCKERHUB_IMAGE:latest image
        # Compare image from branch with latest image from the default branch (informational, does not block pipeline)
        # CVEs in upstream Go binaries (mc-monitor, entrypoint-demoter) are not controllable by this project
        docker scout compare "${DOCKERHUB_IMAGE}:${CI_COMMIT_TAG}" --to "$CI_REGISTRY_IMAGE:latest" --only-severity critical,high --ignore-unchanged --only-fixed --org strausmann || true
        # Inspect Docker Manifest
        docker manifest inspect $DOCKERHUB_IMAGE:$CI_COMMIT_TAG
        docker manifest inspect $DOCKERHUB_IMAGE:$MAJOR_VERSION
        docker manifest inspect $DOCKERHUB_IMAGE:$MAJOR_MINOR_VERSION
        docker manifest inspect $DOCKERHUB_IMAGE:latest
      else
        echo "Running on branch '$CI_COMMIT_BRANCH': ${DOCKERHUB_IMAGE}:${CI_COMMIT_REF_SLUG}"
        # Build Multi Arch Images and push to dockerhub
        docker buildx build --provenance=true --sbom=true --build-arg BUILD_VERSION=$CI_COMMIT_REF_NAME --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') --build-arg VCS_REF=$CI_COMMIT_SHORT_SHA --build-arg CI_BUILD=$CI_PIPELINE_ID --push --platform $BUILDPLATFORM --tag $DOCKERHUB_IMAGE:$CI_COMMIT_REF_SLUG  image
        # Get a CVE report for the built image (informational, does not block pipeline)
        # CVEs in upstream Go binaries (mc-monitor, entrypoint-demoter) are not controllable by this project
        docker scout cves "${DOCKERHUB_IMAGE}:${CI_COMMIT_REF_SLUG}" --only-severity critical,high --only-fixed --org strausmann || true
        # Inspect Docker Manifest
        docker manifest inspect ${DOCKERHUB_IMAGE}:${CI_COMMIT_REF_SLUG}
      fi
  rules:
    # Trigger bei jedem Push in einen Branch, wenn sich Container Image ändert
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH
      changes:
        - image/**/*
        - .gitlab-ci.yml
    # Trigger bei einem TAG Release, wenn sich Container Image ändert
    - if: '$CI_COMMIT_TAG'
      changes:
        - image/**/*
        - .gitlab-ci.yml

sonarcloud-check:
  allow_failure: true
  variables:
    SONAR_USER_HOME: '${CI_PROJECT_DIR}/.sonar' # Defines the location of the analysis task cache
    GIT_DEPTH: '0' # Tells git to fetch all the branches of the project, required by the analysis task
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: ['']
  stage: test
  cache:
    key: '${CI_JOB_NAME}'
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
  tags:
    - dind
  rules:
    # Trigger bei jedem Push in einen Branch
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH

release:
  image: node:24.12.0@sha256:929c026d5a4e4a59685b3c1dbc1a8c3eb090aa95373d3a4fd668daa2493c8331
  stage: release
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline
    - git status
    - git log -1 --name-only
  script:
    - npx --no-install semantic-release
  after_script:
    - 'echo Stage - Release finished'
  rules:
    # Trigger eines Scheduled Task
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    # Trigger bei jedem Push in einen Branch, bis auf den Main Branch
    - if: '$CI_COMMIT_BRANCH'
      when: never
    # Trigger nach einem Commit in einen Merge Request
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    # Niemals doppelte Pipelines wenn man einen Merge Request erstellt hat
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never

# Löscht den Branch-Tag aus Docker Hub wenn ein MR nach main gemergt wird.
# Der Tag entspricht dem CI_COMMIT_REF_SLUG des Source-Branches.
docker_hub_tag_cleanup:
  image: alpine:3
  stage: cleanup
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      NAMESPACE="${DOCKERHUB_NAMESPACE:-strausmann}"
      REPO_NAME="minecraft-bedrock-connect"

      # Source-Branch aus dem Merge-Commit ermitteln
      MERGE_MSG=$(git log -1 --pretty=%s)
      echo "Merge commit: ${MERGE_MSG}"

      # Branch-Slug aus CI_MERGE_REQUEST_SOURCE_BRANCH_NAME oder Commit-Message
      if [ -n "${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME:-}" ]; then
        BRANCH_SLUG=$(echo "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g; s/--*/-/g; s/^-//; s/-$//' | cut -c1-63)
      else
        echo "Kein MR-Kontext — kein Tag zu löschen."
        exit 0
      fi

      echo "Branch-Slug Tag zum Löschen: ${BRANCH_SLUG}"

      # Sicherheitscheck: Protected Tags nie löschen
      if echo "$BRANCH_SLUG" | grep -qE '^(latest|beta|alpha|main|[0-9]+|[0-9]+\.[0-9]+|[0-9]+\.[0-9]+\.[0-9]+)$'; then
        echo "PROTECTED: $BRANCH_SLUG wird nicht gelöscht."
        exit 0
      fi

      # Docker Hub Login
      HUB_TOKEN=$(curl -sf -X POST "https://hub.docker.com/v2/users/login/" \
        -H "Content-Type: application/json" \
        -d "{\"username\":\"${DOCKER_REGISTRY_USER}\",\"password\":\"${DOCKER_REGISTRY_PASSWORD}\"}" \
        | jq -r '.token')

      if [ -z "$HUB_TOKEN" ] || [ "$HUB_TOKEN" = "null" ]; then
        echo "WARNING: Docker Hub Login fehlgeschlagen, Tag nicht gelöscht."
        exit 0
      fi

      # Prüfe ob Tag existiert
      HTTP_CHECK=$(curl -sf -o /dev/null -w "%{http_code}" \
        "https://hub.docker.com/v2/repositories/${NAMESPACE}/${REPO_NAME}/tags/${BRANCH_SLUG}/" \
        -H "Authorization: Bearer ${HUB_TOKEN}")

      if [ "$HTTP_CHECK" != "200" ]; then
        echo "Tag '${BRANCH_SLUG}' existiert nicht auf Docker Hub (HTTP ${HTTP_CHECK}). Nichts zu tun."
        exit 0
      fi

      # Tag löschen
      HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" -X DELETE \
        "https://hub.docker.com/v2/repositories/${NAMESPACE}/${REPO_NAME}/tags/${BRANCH_SLUG}/" \
        -H "Authorization: Bearer ${HUB_TOKEN}")

      if [ "$HTTP_CODE" = "204" ]; then
        echo "Tag '${BRANCH_SLUG}' erfolgreich aus Docker Hub gelöscht."
      else
        echo "WARNING: Tag-Löschung fehlgeschlagen (HTTP ${HTTP_CODE})."
      fi
  allow_failure: true
  tags:
    - dind
  rules:
    # Trigger nur auf main nach einem Merge (nicht bei direkten Pushes)
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME'
      when: always
